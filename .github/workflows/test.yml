name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: Unit Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate current platform binary package
        run: npm run generate-binary-packages -- --set-github-env

      - name: Generate types
        run: npm run generate-types

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

  integration:
    name: Integration (${{ matrix.os }}, Node ${{ matrix.node }})
    needs: unit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate current platform binary package
        run: npm run generate-binary-packages -- --set-github-env

      - name: Generate types
        run: npm run generate-types

      - name: Build
        run: npm run build

      - name: Run integration tests
        run: npm run test:integration

  e2e:
    name: E2E Binary Package (${{ matrix.os }})
    needs: unit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate current platform binary package
        run: npm run generate-binary-packages -- --set-github-env

      - name: Generate types
        run: npm run generate-types

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

  package-resolution:
    name: Package Resolution (${{ matrix.os }})
    needs: unit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate current platform binary package
        run: npm run generate-binary-packages

      - name: Install generated binary package
        shell: bash
        run: |
          package_dir=$(find dist-platforms -mindepth 1 -maxdepth 1 -type d ! -name .downloads | head -n 1)
          npm install --no-save --package-lock=false "$package_dir"

      - name: Generate types
        run: npm run generate-types

      - name: Build
        run: npm run build

      - name: Verify package-resolved Hugo
        run: |
          node -e "
            import('./dist/hugo.mjs').then(async (m) => {
              const bin = await m.default();
              console.log(bin);
              const { stdout } = await m.execWithOutput('version');
              console.log(stdout.trim());
            }).catch((error) => {
              console.error(error);
              process.exit(1);
            });
          "

  pack:
    name: Pack Dry Run
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate current platform binary package
        run: npm run generate-binary-packages

      - name: Root package dry run
        run: npm pack --dry-run

      - name: Binary package dry run
        shell: bash
        run: |
          package_dir=$(find dist-platforms -mindepth 1 -maxdepth 1 -type d ! -name .downloads | head -n 1)
          npm pack --dry-run "$package_dir"
